databases:
  - name: watchpicker-db
    plan: basic-256mb
    databaseName: watchpicker
    user: watchpicker

services:
  - type: web
    name: watchpicker-api
    runtime: python
    rootDir: watch-picker-api
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    preDeployCommand: ./scripts/render_predeploy.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --no-access-log --limit-concurrency 200 --timeout-keep-alive 10 --ws-max-size 4096 --ws-max-queue 16 --ws-ping-interval 20 --ws-ping-timeout 20
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: watchpicker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        value: https://arbitertv.com,https://www.arbitertv.com
      - key: TMDB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_GOOGLE_CALLBACK_URL
        sync: false
      - key: OAUTH_FRONTEND_SUCCESS_URL
        value: https://www.arbitertv.com/app
      - key: OAUTH_FRONTEND_FAILURE_URL
        value: https://www.arbitertv.com/login
      - key: OAUTH_SESSION_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FEEDBACK_RECIPIENT_EMAIL
        sync: false
      - key: FEEDBACK_FROM_EMAIL
        sync: false
      - key: FEEDBACK_PUBLIC_ENABLED
        value: "false"
      - key: FEEDBACK_AUTHENTICATED_ENABLED
        value: "false"
      - key: RATE_LIMIT_REDIS_URL
        sync: false
      - key: MAGIC_LINK_VERIFY_URL
        value: https://www.arbitertv.com/auth/magic-link/verify
      - key: MAGIC_LINK_EXPIRE_MINUTES
        value: "15"
