name: Security and tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: watchpicker
          POSTGRES_PASSWORD: watchpicker
          POSTGRES_DB: watchpicker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watchpicker -d watchpicker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://watchpicker:watchpicker@localhost:5432/watchpicker_test
      JWT_SECRET: dev-test-secret
      CORS_ORIGINS: http://localhost:5173
      TMDB_TOKEN: test-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: pip-audit -r requirements.txt
      - run: bandit -q -ll -r app -x tests
      - run: ruff check app tests scripts alembic
      - run: alembic upgrade head
      - run: pytest -q

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
